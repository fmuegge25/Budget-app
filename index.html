const { useReducer, useState, useEffect, useMemo, createContext, useContext } = React;

// ---------- Utilities ----------
const uid = () => Math.random().toString(36).slice(2, 10);
const todayStr = () => new Date().toISOString().slice(0, 10);
const monthKeyOf = (dateStr) => dateStr.slice(0, 7);
const todayMonthKey = () => todayStr().slice(0, 7);

function fmt(n) {
  const v = Math.abs(n || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  return n < 0 ? `($${v})` : `$${v}`;
}

function moneyClass(n) {
  if (n < -0.004) return 'text-red-600';
  if (n > 0.004) return 'text-emerald-700';
  return 'text-gray-500';
}

function shiftMonth(monthKey, delta) {
  let [y, m] = monthKey.split('-').map(Number);
  m += delta;
  while (m > 12) { m -= 12; y += 1; }
  while (m < 1) { m += 12; y -= 1; }
  return `${y}-${String(m).padStart(2, '0')}`;
}

function monthLabel(monthKey) {
  const [y, m] = monthKey.split('-').map(Number);
  return new Date(y, m - 1, 1).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
}

function monthRange(minKey, maxKey) {
  const out = [];
  let cur = minKey;
  let guard = 0;
  while (cur <= maxKey && guard < 600) {
    out.push(cur);
    if (cur === maxKey) break;
    cur = shiftMonth(cur, 1);
    guard++;
  }
  return out;
}

function parseCsv(text) {
  const lines = text.replace(/\r/g, '').split('\n').filter(l => l.trim() !== '');
  if (!lines.length) return [];
  const splitLine = (line) => {
    const cells = [];
    let cur = '', inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (inQuotes) {
        if (ch === '"' && line[i + 1] === '"') { cur += '"'; i++; }
        else if (ch === '"') inQuotes = false;
        else cur += ch;
      } else {
        if (ch === '"') inQuotes = true;
        else if (ch === ',') { cells.push(cur); cur = ''; }
        else cur += ch;
      }
    }
    cells.push(cur);
    return cells;
  };
  const headers = splitLine(lines[0]).map(h => h.trim());
  return lines.slice(1).map(line => {
    const cells = splitLine(line);
    const row = {};
    headers.forEach((h, i) => { row[h] = (cells[i] || '').trim(); });
    return row;
  });
}

function parseBankDate(str) {
  const m = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (!m) return null;
  const [, mo, d, y] = m;
  return `${y}-${mo.padStart(2, '0')}-${d.padStart(2, '0')}`;
}

function parseBankCsv(text) {
  return parseCsv(text)
    .map(row => {
      const date = parseBankDate(row['Date'] || '');
      const amount = parseFloat((row['Amount'] || '').replace(/[^0-9.\-]/g, ''));
      if (!date || isNaN(amount)) return null; // skip non-transaction rows (e.g. "Daily Ledger Bal")
      const bankCategory = row['Category'] || '';
      const memo = row['Memo'] || (bankCategory ? `(bank category: ${bankCategory})` : '');
      return { date, description: row['Description'] || '(no description)', amount, memo };
    })
    .filter(Boolean);
}

const GROUPS = ['Wants', 'Needs', 'Bills', 'Debts'];
const ALL_GROUPS = [...GROUPS, 'Deposits', 'Transfer'];

// ---------- Sample Data ----------
function sampleData() {
  const cat = (group, name) => ({ id: uid(), group, name });
  const categories = [
    cat('Wants', 'Dining Out'), cat('Wants', 'My spending money'), cat('Wants', 'Their spending money'),
    cat('Wants', 'Gifts'), cat('Wants', 'Treat your spouse'), cat('Wants', 'Experiences'), cat('Wants', 'Gas Station Food'),
    cat('Needs', 'Dr. Visits'), cat('Needs', 'MISC'), cat('Needs', 'Dog Stuff'), cat('Needs', 'Groceries'),
    cat('Needs', 'Gas'), cat('Needs', 'Auto Maintenance'), cat('Needs', 'Emergency Fund'), cat('Needs', 'Reimbursement'), cat('Needs', 'Split'),
    cat('Bills', 'Tithing'), cat('Bills', 'Rent'), cat('Bills', 'Utilities'), cat('Bills', 'Internet'),
    cat('Bills', 'Auto Insurance'), cat('Bills', 'Subscriptions'), cat('Bills', 'YouTube TV'),
    cat('Bills', 'Supporting Jacob'), cat('Bills', 'Business Expense'),
    cat('Debts', 'Jaime Oakes'), cat('Debts', 'Auto Loans'),
  ];
  const accounts = [
    { id: uid(), name: 'CFCU Checking', startingBalance: 10193.42 },
    { id: uid(), name: 'CFCU Savings', startingBalance: 186.84 },
    { id: uid(), name: 'SEB Checking', startingBalance: 1860.31 },
    { id: uid(), name: 'SEB Savings', startingBalance: 121.39 },
    { id: uid(), name: 'FM Feeders', startingBalance: 442.36 },
    { id: uid(), name: 'Credit Card', startingBalance: 0 },
  ];
  return { accounts, categories, transactions: [], budgetMonths: {}, carryOverrides: {}, debts: [], rules: [], balanceOverrides: {} };
}

// Auto-categorize rules: description contains `match` (case-insensitive) ->
// always this category. Checked against a raw description string so both
// new imports and the bulk "apply to existing" pass can share it.
function matchRule(state, description) {
  const desc = (description || '').toLowerCase();
  for (const r of state.rules || []) {
    if (r.match && desc.includes(r.match.toLowerCase())) {
      const cat = state.categories.find(c => c.id === r.categoryId);
      if (cat) return { group: cat.group, categoryId: r.categoryId };
    }
  }
  return null;
}

// ---------- Reducer ----------
function reducer(state, action) {
  switch (action.type) {
    case 'ADD_TRANSACTION':
      // manual: true marks this as typed in by hand (the only path that
      // creates one) -- the bank-import dedup logic checks this flag so it
      // never silently overwrites a manual entry's amount/description
      // thinking it's a pending transaction settling.
      return { ...state, transactions: [...state.transactions, { id: uid(), manual: true, ...action.tx }] };
    case 'UPDATE_TRANSACTION':
      return { ...state, transactions: state.transactions.map(t => t.id === action.id ? { ...t, ...action.patch } : t) };
    case 'DELETE_TRANSACTION': {
      const target = state.transactions.find(t => t.id === action.id);
      const linkId = target && target.linkId;
      return {
        ...state,
        transactions: state.transactions.filter(t => t.id !== action.id && !(linkId && t.linkId === linkId)),
      };
    }
    // Undo support for DELETE_TRANSACTION -- re-inserts the exact original
    // transaction object(s) (both halves, if it was a linked transfer).
    case 'RESTORE_TRANSACTIONS':
      return { ...state, transactions: [...state.transactions, ...action.transactions] };
    case 'ADD_TRANSFER': {
      const linkId = uid();
      const out = { id: uid(), date: action.date, accountId: action.fromAccountId, description: `Transfer to ${action.toName}`, amount: -Math.abs(action.amount), group: 'Transfer', categoryId: null, memo: action.memo || '', linkId };
      const inn = { id: uid(), date: action.date, accountId: action.toAccountId, description: `Transfer from ${action.fromName}`, amount: Math.abs(action.amount), group: 'Transfer', categoryId: null, memo: action.memo || '', linkId };
      return { ...state, transactions: [...state.transactions, out, inn] };
    }
    case 'UPDATE_TRANSFER': {
      // action.id identifies whichever leg you clicked "edit" on -- that
      // side's account stays fixed; action.otherAccountId lets you move the
      // *other* leg to a different account. Both legs always share the same
      // date/amount/memo, opposite-signed.
      const thisTx = state.transactions.find(t => t.id === action.id);
      const otherTx = thisTx && state.transactions.find(t => t.linkId === thisTx.linkId && t.id !== thisTx.id);
      if (!thisTx || !otherTx) return state;
      const sign = thisTx.amount < 0 ? -1 : 1;
      const thisAcc = state.accounts.find(a => a.id === thisTx.accountId);
      const otherAcc = state.accounts.find(a => a.id === action.otherAccountId);
      const transactions = state.transactions.map(t => {
        if (t.id === thisTx.id) {
          return {
            ...t, date: action.date, amount: sign * Math.abs(action.amount), memo: action.memo || '',
            description: sign < 0 ? `Transfer to ${otherAcc ? otherAcc.name : ''}` : `Transfer from ${otherAcc ? otherAcc.name : ''}`,
          };
        }
        if (t.id === otherTx.id) {
          return {
            ...t, date: action.date, amount: -sign * Math.abs(action.amount), memo: action.memo || '', accountId: action.otherAccountId,
            description: sign < 0 ? `Transfer from ${thisAcc ? thisAcc.name : ''}` : `Transfer to ${thisAcc ? thisAcc.name : ''}`,
          };
        }
        return t;
      });
      return { ...state, transactions };
    }
    case 'MERGE_TO_TRANSFER': {
      // Two separately-imported, unlinked transactions (e.g. both sides of
      // a real bank transfer, each imported independently from its own
      // account's CSV) get replaced by one properly linked Transfer pair,
      // same shape ADD_TRANSFER produces. The raw originals are deleted so
      // nothing gets double-counted as fake expense + fake income.
      const txA = state.transactions.find(t => t.id === action.idA);
      const txB = state.transactions.find(t => t.id === action.idB);
      if (!txA || !txB) return state;
      const [outTx, inTx] = txA.amount < 0 ? [txA, txB] : [txB, txA];
      const fromAcc = state.accounts.find(a => a.id === outTx.accountId);
      const toAcc = state.accounts.find(a => a.id === inTx.accountId);
      const linkId = uid();
      const amount = Math.abs(outTx.amount);
      const newOut = { id: uid(), date: outTx.date, accountId: outTx.accountId, description: `Transfer to ${toAcc ? toAcc.name : ''}`, amount: -amount, group: 'Transfer', categoryId: null, memo: outTx.memo || inTx.memo || '', linkId };
      const newIn = { id: uid(), date: outTx.date, accountId: inTx.accountId, description: `Transfer from ${fromAcc ? fromAcc.name : ''}`, amount, group: 'Transfer', categoryId: null, memo: outTx.memo || inTx.memo || '', linkId };
      const remaining = state.transactions.filter(t => t.id !== txA.id && t.id !== txB.id);
      return { ...state, transactions: [...remaining, newOut, newIn] };
    }
    case 'SET_ASSIGNED': {
      const monthData = { ...(state.budgetMonths[action.monthKey] || {}) };
      monthData[action.categoryId] = action.amount;
      return { ...state, budgetMonths: { ...state.budgetMonths, [action.monthKey]: monthData } };
    }
    case 'SET_CARRY_OVERRIDE': {
      // Corrects the running carry-in balance for a category starting at
      // this month -- e.g. reconciling it to match reality after manual
      // bookkeeping drift. Only this month's carry-in is set explicitly;
      // every later month still accumulates normally (carry + assigned +
      // actual) starting from the corrected value, same as before.
      const monthData = { ...(state.carryOverrides[action.monthKey] || {}) };
      monthData[action.categoryId] = action.amount;
      return { ...state, carryOverrides: { ...state.carryOverrides, [action.monthKey]: monthData } };
    }
    case 'ADD_CATEGORY':
      return { ...state, categories: [...state.categories, { id: uid(), group: action.group, name: action.name }] };
    case 'RENAME_CATEGORY':
      return { ...state, categories: state.categories.map(c => c.id === action.id ? { ...c, name: action.name } : c) };
    case 'DELETE_CATEGORY':
      return { ...state, categories: state.categories.filter(c => c.id !== action.id) };
    case 'MOVE_CATEGORY': {
      const cats = [...state.categories];
      const idx = cats.findIndex(c => c.id === action.id);
      if (idx === -1) return state;
      const group = cats[idx].group;
      const step = action.direction === 'up' ? -1 : 1;
      for (let i = idx + step; i >= 0 && i < cats.length; i += step) {
        if (cats[i].group === group) {
          [cats[i], cats[idx]] = [cats[idx], cats[i]];
          break;
        }
      }
      return { ...state, categories: cats };
    }
    case 'ADD_ACCOUNT':
      return { ...state, accounts: [...state.accounts, { id: uid(), name: action.name, startingBalance: action.startingBalance || 0 }] };
    case 'RENAME_ACCOUNT':
      return { ...state, accounts: state.accounts.map(a => a.id === action.id ? { ...a, name: action.name } : a) };
    case 'SET_STARTING_BALANCE':
      return { ...state, accounts: state.accounts.map(a => a.id === action.id ? { ...a, startingBalance: action.startingBalance } : a) };
    case 'SET_BALANCE_OVERRIDE': {
      // Corrects an account's balance as of a specific date without
      // touching history -- same pattern as SET_CARRY_OVERRIDE above, but
      // for account balances instead of category carry-in. accountBalance()
      // uses the most recent override as its new base and only adds
      // transactions dated *after* it, so nothing before that date (already
      // baked into the corrected number) gets double-counted, and nothing
      // about prior dates/reports changes.
      const forAccount = { ...((state.balanceOverrides || {})[action.accountId] || {}) };
      forAccount[action.date] = action.amount;
      return { ...state, balanceOverrides: { ...(state.balanceOverrides || {}), [action.accountId]: forAccount } };
    }
    case 'DELETE_BALANCE_OVERRIDE': {
      const forAccount = { ...((state.balanceOverrides || {})[action.accountId] || {}) };
      delete forAccount[action.date];
      return { ...state, balanceOverrides: { ...(state.balanceOverrides || {}), [action.accountId]: forAccount } };
    }
    case 'DELETE_ACCOUNT':
      return { ...state, accounts: state.accounts.filter(a => a.id !== action.id), transactions: state.transactions.filter(t => t.accountId !== action.id) };
    case 'IMPORT_CSV': {
      const existingKeys = new Set(
        state.transactions
          .filter(t => t.accountId === action.accountId)
          .map(t => `${t.date}|${t.description}|${t.amount}`)
      );
      const newTxns = action.rows
        .filter(r => !existingKeys.has(`${r.date}|${r.description}|${r.amount}`))
        .map(r => {
          const rule = matchRule(state, r.description);
          return {
            id: uid(),
            date: r.date,
            accountId: action.accountId,
            description: r.description,
            amount: r.amount,
            group: rule ? rule.group : (r.amount > 0 ? 'Deposits' : null),
            categoryId: rule ? rule.categoryId : null,
            memo: r.memo || '',
          };
        });
      return { ...state, transactions: [...state.transactions, ...newTxns] };
    }
    case 'BANK_SYNC': {
      const removed = new Set(action.removed || []);
      const existingPlaidIds = new Set(state.transactions.filter(t => t.plaidId).map(t => t.plaidId));
      const newTxns = (action.added || [])
        .filter(t => !existingPlaidIds.has(t.id))
        .map(t => {
          const description = t.payee || t.memo || 'Bank transaction';
          const rule = matchRule(state, description);
          return {
            id: uid(),
            plaidId: t.id,
            date: t.date,
            accountId: action.accountId,
            description,
            amount: t.amount,
            group: rule ? rule.group : (t.amount > 0 ? 'Deposits' : null),
            categoryId: rule ? rule.categoryId : null,
            memo: t.memo || '',
          };
        });
      return {
        ...state,
        transactions: [...state.transactions.filter(t => !(t.plaidId && removed.has(t.plaidId))), ...newTxns],
      };
    }
    case 'ADD_RULE': {
      const rule = { id: uid(), match: action.match, categoryId: action.categoryId };
      const cat = state.categories.find(c => c.id === action.categoryId);
      const matchLower = action.match.toLowerCase();
      // Sweeps the existing uncategorized queue immediately, not just future
      // imports -- so adding a rule for "CLC" also clears out every past CLC
      // transaction already sitting there, not just ones from here on.
      const transactions = state.transactions.map(t => {
        if (cat && needsCategorizing(t) && t.description && t.description.toLowerCase().includes(matchLower)) {
          return { ...t, group: cat.group, categoryId: action.categoryId };
        }
        return t;
      });
      return { ...state, rules: [...(state.rules || []), rule], transactions };
    }
    case 'DELETE_RULE':
      return { ...state, rules: (state.rules || []).filter(r => r.id !== action.id) };
    case 'LOAD':
      return migrateDebts({ debts: [], ...action.state });
    case 'ADD_DEBT': {
      // Every debt gets a matching Debts-group category, atomically, so a
      // payment transaction categorized to it can auto-reduce the balance.
      const categoryId = uid();
      return {
        ...state,
        categories: [...state.categories, { id: categoryId, group: 'Debts', name: action.name }],
        debts: [...state.debts, { id: uid(), name: action.name, balance: action.balance, apr: action.apr, categoryId }],
      };
    }
    case 'EDIT_DEBT':
      return { ...state, debts: state.debts.map(d => d.id === action.id ? { ...d, ...action.patch } : d) };
    case 'DELETE_DEBT':
      return { ...state, debts: state.debts.filter(d => d.id !== action.id) };
    default:
      return state;
  }
}

// Backfills a Debts-group category link for any debt that doesn't have one
// yet (older saved data, or a debt whose name matches a pre-existing
// category) -- this is what lets a categorized payment transaction
// auto-reduce that debt's balance.
function migrateDebts(state) {
  const debts = state.debts || [];
  const categories = [...(state.categories || [])];
  const migrated = debts.map(d => {
    if (d.categoryId) return d;
    let cat = categories.find(c => c.group === 'Debts' && c.name === d.name);
    if (!cat) { cat = { id: uid(), group: 'Debts', name: d.name }; categories.push(cat); }
    return { ...d, categoryId: cat.id };
  });
  return { ...state, categories, debts: migrated, carryOverrides: state.carryOverrides || {}, rules: state.rules || [], balanceOverrides: state.balanceOverrides || {} };
}

function loadInitial() {
  try {
    const raw = localStorage.getItem('simplebudget1');
    if (raw) return migrateDebts(JSON.parse(raw));
  } catch (e) {}
  return migrateDebts(sampleData());
}

// ---------- Budget math ----------
// A category's budgeted amount carries forward unchanged from whichever
// month it was last explicitly set in -- it does NOT reset to $0 every new
// month. Editing "Budgeted" for a month writes an explicit override for
// that month (SET_ASSIGNED), which then becomes the new carried-forward
// value for every later month, until the next explicit edit.
function effectiveAssigned(state, catId, monthKey) {
  const direct = (state.budgetMonths[monthKey] || {})[catId];
  if (direct !== undefined) return direct;
  const priorMonths = Object.keys(state.budgetMonths)
    .filter(m => m < monthKey && (state.budgetMonths[m] || {})[catId] !== undefined)
    .sort();
  return priorMonths.length ? state.budgetMonths[priorMonths[priorMonths.length - 1]][catId] : 0;
}

function computeCategoryHistory(state, catId, uptoMonthKey) {
  const txMonths = state.transactions.filter(t => t.categoryId === catId).map(t => monthKeyOf(t.date));
  const assignedMonths = Object.keys(state.budgetMonths).filter(m => (state.budgetMonths[m] || {})[catId] !== undefined);
  const carryOverrideMonths = Object.keys(state.carryOverrides || {}).filter(m => (state.carryOverrides[m] || {})[catId] !== undefined);
  const candidates = [...txMonths, ...assignedMonths, ...carryOverrideMonths, uptoMonthKey];
  const minMonth = candidates.reduce((a, b) => (a < b ? a : b), uptoMonthKey);
  const range = monthRange(minMonth, uptoMonthKey);
  let carry = 0, row = { carryIn: 0, assigned: 0, actual: 0, remaining: 0 };
  for (const m of range) {
    const carryOverride = (state.carryOverrides[m] || {})[catId];
    if (carryOverride !== undefined) carry = carryOverride;
    const assigned = effectiveAssigned(state, catId, m);
    const actual = state.transactions
      .filter(t => t.categoryId === catId && monthKeyOf(t.date) === m)
      .reduce((s, t) => s + t.amount, 0);
    const remaining = carry + assigned + actual;
    row = { carryIn: carry, assigned, actual, remaining };
    carry = remaining;
  }
  return row;
}

function accountBalance(state, accountId) {
  const acc = state.accounts.find(a => a.id === accountId);
  if (!acc) return 0;
  const txns = state.transactions.filter(t => t.accountId === accountId);
  const overrides = (state.balanceOverrides || {})[accountId] || {};
  const overrideDates = Object.keys(overrides).sort();
  if (overrideDates.length === 0) {
    return acc.startingBalance + txns.reduce((s, t) => s + t.amount, 0);
  }
  // Most recent correction becomes the new base -- only transactions dated
  // *after* it still accumulate on top, so anything already baked into the
  // corrected number (including a stray old transaction that shows up
  // later) never gets double-counted, and every date up through the
  // correction point is left exactly as it was.
  const latest = overrideDates[overrideDates.length - 1];
  const sumAfter = txns.filter(t => t.date > latest).reduce((s, t) => s + t.amount, 0);
  return overrides[latest] + sumAfter;
}

// Amount paid toward a debt so far = all transactions categorized to its
// linked Debts category (spending transactions carry a negative amount).
function debtPaidSoFar(state, categoryId) {
  if (!categoryId) return 0;
  return state.transactions.filter(t => t.categoryId === categoryId).reduce((s, t) => s - t.amount, 0);
}

// The balance you enter on a debt is the starting point; recording a
// payment (a transaction categorized to that debt) automatically brings
// this current balance down from there.
function debtCurrentBalance(state, debt) {
  return debt.balance - debtPaidSoFar(state, debt.categoryId);
}

function totalAssignedForMonth(state, monthKey) {
  return state.categories.reduce((s, c) => s + effectiveAssigned(state, c.id, monthKey), 0);
}

function readyToAssign(state, monthKey) {
  const totalBalances = state.accounts.reduce((s, a) => s + accountBalance(state, a.id), 0);
  return totalBalances - totalAssignedForMonth(state, monthKey);
}

function needsCategorizing(t) {
  return !t.group || ((GROUPS.includes(t.group) || t.group === 'Deposits') && !t.categoryId);
}

function countUncategorized(state) {
  return state.transactions.filter(needsCategorizing).length;
}

// Finds likely-transfer pairs sitting in the uncategorized queue: same
// amount, opposite sign, different accounts, posted within a couple days of
// each other (bank-to-bank posting isn't always same-day). Scoped to
// needsCategorizing() only -- an already-linked or already-categorized
// transaction is left alone, so this only ever offers to merge things that
// haven't been touched yet, never something the user already decided on.
function findTransferCandidates(state) {
  const pool = state.transactions.filter(t => !t.linkId && needsCategorizing(t));
  const used = new Set();
  const pairs = [];
  for (let i = 0; i < pool.length; i++) {
    const a = pool[i];
    if (used.has(a.id)) continue;
    for (let j = i + 1; j < pool.length; j++) {
      const b = pool[j];
      if (used.has(b.id)) continue;
      if (a.accountId === b.accountId) continue;
      if (Math.abs(a.amount) !== Math.abs(b.amount)) continue;
      if ((a.amount < 0) === (b.amount < 0)) continue;
      const daysApart = Math.abs((new Date(a.date) - new Date(b.date)) / 86400000);
      if (daysApart > 2) continue;
      pairs.push(a.amount < 0 ? [a, b] : [b, a]); // [outTx, inTx]
      used.add(a.id); used.add(b.id);
      break;
    }
  }
  return pairs;
}

function EditableMoney({ value, onCommit, className, editable }) {
  const [text, setText] = useState(value === 0 ? '' : String(value));
  useEffect(() => { setText(value === 0 ? '' : String(value)); }, [value]);

  if (!editable) {
    return <span className={`text-right tabular-nums ${className || 'w-24'}`}>{fmt(value)}</span>;
  }

  return (
    <input
      type="text"
      value={text}
      onChange={e => setText(e.target.value)}
      onBlur={() => {
        const n = parseFloat(text.replace(/[^0-9.\-]/g, ''));
        onCommit(isNaN(n) ? 0 : n);
      }}
      className={`text-right tabular-nums bg-transparent border-b border-gray-400 outline-none focus:border-blue-500 focus:bg-blue-50/40 rounded-t px-0.5 -mx-0.5 transition-colors ${className || 'w-24'}`}
      placeholder="0.00"
    />
  );
}

function TxEditorRow({ accountId, initial, onSubmit, onCancel, submitLabel }) {
  const { state } = useContext(BudgetContext);
  const [date, setDate] = useState(initial.date || todayStr());
  const [desc, setDesc] = useState(initial.description || '');
  const [amount, setAmount] = useState(initial.amount !== undefined ? String(Math.abs(initial.amount)) : '');
  const [group, setGroup] = useState(initial.group || 'Needs');
  const [categoryId, setCategoryId] = useState(initial.categoryId || '');
  // Editing an existing transfer: initial has no toAccountId field of its
  // own (transactions only store accountId + linkId) -- look up the linked
  // sibling's account so the dropdown starts pre-filled with the real
  // other side instead of blank.
  const initialOtherAccountId = initial.linkId
    ? ((state.transactions.find(t => t.linkId === initial.linkId && t.id !== initial.id) || {}).accountId || '')
    : '';
  const [toAccountId, setToAccountId] = useState(initialOtherAccountId);
  const [memo, setMemo] = useState(initial.memo || '');
  const isIncomingTransfer = initial.amount > 0;

  const catOptions = state.categories.filter(c => c.group === group);
  const otherAccounts = state.accounts.filter(a => a.id !== accountId);

  function submit() {
    const amt = parseFloat(amount);
    if (!desc.trim() && group !== 'Transfer') return;
    if (isNaN(amt)) return;
    if (group === 'Transfer') {
      if (!toAccountId) return;
      if (initial.id) {
        onSubmit({ kind: 'transfer', id: initial.id, date, amount: amt, toAccountId, memo });
      } else {
        onSubmit({ kind: 'transfer', date, amount: amt, toAccountId, memo });
      }
    } else {
      const signedAmount = group === 'Deposits' ? Math.abs(amt) : -Math.abs(amt);
      onSubmit({
        kind: 'transaction',
        date,
        description: desc.trim() || (group === 'Deposits' ? 'Deposit' : 'Expense'),
        amount: signedAmount,
        group,
        categoryId: categoryId || null,
        memo,
      });
    }
  }

  return (
    <tr className="bg-blue-50">
      <td className="px-2 py-1"><input type="date" value={date} onChange={e => setDate(e.target.value)} className="border rounded px-1 py-0.5 text-sm w-full" /></td>
      <td className="px-2 py-1">
        {group === 'Transfer'
          ? <span className="text-gray-400 text-sm italic">Transfer</span>
          : <input value={desc} onChange={e => setDesc(e.target.value)} placeholder="Description" className="border rounded px-1 py-0.5 text-sm w-full" />}
      </td>
      <td className="px-2 py-1"><input value={amount} onChange={e => setAmount(e.target.value)} placeholder="0.00" className="border rounded px-1 py-0.5 text-sm w-full text-right" /></td>
      <td className="px-2 py-1">
        <select value={group} onChange={e => { setGroup(e.target.value); setCategoryId(''); setToAccountId(''); }} className="border rounded px-1 py-0.5 text-sm w-full">
          {ALL_GROUPS.map(g => <option key={g} value={g}>{g}</option>)}
        </select>
      </td>
      <td className="px-2 py-1">
        {group === 'Transfer' ? (
          <select value={toAccountId} onChange={e => setToAccountId(e.target.value)} className="border rounded px-1 py-0.5 text-sm w-full">
            <option value="">{isIncomingTransfer ? '— from account —' : '— to account —'}</option>
            {otherAccounts.map(a => <option key={a.id} value={a.id}>{a.name}</option>)}
          </select>
        ) : (
          <select value={categoryId} onChange={e => setCategoryId(e.target.value)} className="border rounded px-1 py-0.5 text-sm w-full">
            <option value="">— category —</option>
            {catOptions.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
          </select>
        )}
      </td>
      <td className="px-2 py-1"><input value={memo} onChange={e => setMemo(e.target.value)} placeholder="Memo" className="border rounded px-1 py-0.5 text-sm w-full" /></td>
      <td className="px-2 py-1"></td>
      <td className="px-2 py-1 whitespace-nowrap">
        <button onClick={submit} className="px-2 py-0.5 bg-blue-600 text-white rounded text-sm">{submitLabel}</button>
        {onCancel && <button onClick={onCancel} className="px-2 py-0.5 ml-1 bg-gray-100 rounded text-sm">Cancel</button>}
      </td>
    </tr>
  );
}

const BANK_SERVER = ''; // relative — same origin the app was loaded from (works over Tailscale too)

function PlaidSetupModal({ onClose }) {
  const [clientId, setClientId] = useState('');
  const [secret, setSecret] = useState('');
  const [env, setEnv] = useState('sandbox');
  const [saving, setSaving] = useState(false);

  async function save() {
    setSaving(true);
    try {
      await fetch(`${BANK_SERVER}/api/configure`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ client_id: clientId, secret, plaid_env: env }),
      });
      onClose();
    } catch (e) {
      alert('Could not reach bank sync server. Make sure it is running ("Start Bank Sync Server.bat").');
    } finally {
      setSaving(false);
    }
  }

  return (
    <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50" onClick={onClose}>
      <div className="bg-white rounded-lg shadow-xl p-6 w-full max-w-md" onClick={e => e.stopPropagation()}>
        <h3 className="text-lg font-semibold mb-4">Setup Plaid Bank Sync</h3>
        <div className="space-y-3 text-sm">
          <p className="text-gray-600">Get credentials from <strong>dashboard.plaid.com</strong>. Use <em>Sandbox</em> to test without a real bank.</p>
          <div>
            <label className="block text-xs font-medium text-gray-600 mb-1">Client ID</label>
            <input autoFocus value={clientId} onChange={e => setClientId(e.target.value)} className="w-full border rounded px-3 py-2 text-sm" placeholder="Plaid client_id" />
          </div>
          <div>
            <label className="block text-xs font-medium text-gray-600 mb-1">Secret</label>
            <input type="password" value={secret} onChange={e => setSecret(e.target.value)} className="w-full border rounded px-3 py-2 text-sm" placeholder="Plaid secret" />
          </div>
          <div>
            <label className="block text-xs font-medium text-gray-600 mb-1">Environment</label>
            <select value={env} onChange={e => setEnv(e.target.value)} className="w-full border rounded px-3 py-2 text-sm bg-white">
              <option value="sandbox">Sandbox (test)</option>
              <option value="development">Development</option>
              <option value="production">Production</option>
            </select>
          </div>
          <div className="flex gap-3 pt-2">
            <button onClick={onClose} className="flex-1 border rounded py-2 text-gray-600 hover:bg-gray-50">Cancel</button>
            <button onClick={save} disabled={saving || !clientId || !secret} className="flex-1 bg-blue-600 text-white rounded py-2 font-medium hover:bg-blue-700 disabled:opacity-40">

function BankSyncBar({ account }) {
  const { dispatch } = useContext(BudgetContext);
  const [status, setStatus] = useState(null);
  const [syncing, setSyncing] = useState(false);
  const [showSetup, setShowSetup] = useState(false);

  const checkStatus = () => fetch(`${BANK_SERVER}/api/status`).then(r => r.json()).then(setStatus).catch(() => setStatus(null));
  useEffect(() => { checkStatus(); }, []);

  async function connect() {
    try {
      const res = await fetch(`${BANK_SERVER}/api/create_link_token`, { method: 'POST' }).then(r => r.json());
      if (res.error) return alert(res.error);
      const handler = Plaid.create({
        token: res.link_token,
        onSuccess: async (public_token) => {
          await fetch(`${BANK_SERVER}/api/exchange_token`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ public_token, account_name: account.name }),
          });
          checkStatus();
        },
        onExit: () => {},
      });
      handler.open();
    } catch (e) {
      alert('Bank sync server not running. Start it with "Start Bank Sync Server.bat"');
    }
  }

  async function sync() {
    setSyncing(true);
    try {
      const res = await fetch(`${BANK_SERVER}/api/sync_transactions`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ account_name: account.name }),
      }).then(r => r.json());
      if (res.error) { alert(res.error); return; }
      dispatch({ type: 'BANK_SYNC', accountId: account.id, added: res.added, removed: res.removed });
      alert(`Synced! ${res.added.length} new, ${res.removed.length} removed.`);
    } catch (e) {
      alert('Sync failed — is the bank sync server running?');
    } finally {
      setSyncing(false);
    }
  }

  async function disconnect() {
    if (!window.confirm(`Disconnect bank from "${account.name}"?`)) return;
    await fetch(`${BANK_SERVER}/api/disconnect`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ account_name: account.name }),
    });
    checkStatus();
  }

  const connected = status && status.connected_items && status.connected_items.includes(account.name);

  if (!status) {
    return (
      <div className="px-4 py-2 border-b bg-gray-50 text-xs text-gray-400 flex items-center gap-2">
        <span>Bank sync server not detected.</span>
        <button onClick={() => setShowSetup(true)} className="text-blue-600 hover:underline">Configure Plaid</button>
        {showSetup && <PlaidSetupModal onClose={() => { setShowSetup(false); checkStatus(); }} />}
      </div>
    );
  }
  if (!status.configured) {
    return (
      <div className="px-4 py-2 border-b bg-gray-50 flex items-center gap-3 text-sm">
        <span className="text-gray-500">Bank sync not configured.</span>
        <button onClick={() => setShowSetup(true)} className="text-blue-600 hover:underline">Setup Plaid</button>
        {showSetup && <PlaidSetupModal onClose={() => { setShowSetup(false); checkStatus(); }} />}
      </div>
    );
  }
  return (
    <div className="px-4 py-2 border-b bg-gray-50 flex items-center gap-3 text-sm">
      {connected ? (
        <>
          <span className="text-emerald-600 font-medium">✓ Bank Connected</span>
          <button onClick={sync} disabled={syncing} className="bg-blue-600 text-white px-3 py-1 rounded hover:bg-blue-700 disabled:opacity-50 text-xs">
            {syncing ? 'Syncing…' : 'Sync Now'}
          </button>
          <button onClick={disconnect} className="text-red-500 hover:underline text-xs">Disconnect</button>
        </>
      ) : (
        <>
          <span className="text-gray-500">No bank connected.</span>
          <button onClick={connect} className="bg-blue-600 text-white px-3 py-1 rounded hover:bg-blue-700 text-xs">Connect Bank</button>
        </>
      )}
      {showSetup && <PlaidSetupModal onClose={() => { setShowSetup(false); checkStatus(); }} />}
    </div>
  );
}

const CATEGORIZABLE_GROUPS = [...GROUPS, 'Deposits'];

function GroupCategoryPicker({ t }) {
  const { state, dispatch } = useContext(BudgetContext);
  const [group, setGroup] = useState(
    CATEGORIZABLE_GROUPS.includes(t.group) ? t.group : (t.amount > 0 ? 'Deposits' : 'Needs')
  );
  const [categoryId, setCategoryId] = useState(t.categoryId || '');
  const catOptions = state.categories.filter(c => c.group === group);

  // Mobile's native <select> picker fires 'change' then 'blur' back-to-back,
  // often before React has re-rendered from the 'change' handler's setState --
  // so onBlur/onKeyDown reading `group`/`categoryId` straight from state can
  // commit a stale (pre-selection) value, which is why picks were silently
  // not saving. Refs are updated synchronously in onChange so commit() always
  // sees the true latest selection regardless of render timing.
  const groupRef = React.useRef(group);
  const categoryIdRef = React.useRef(categoryId);

  function commit(nextGroup, nextCategoryId) {
    dispatch({ type: 'UPDATE_TRANSACTION', id: t.id, patch: { group: nextGroup, categoryId: nextCategoryId || null } });
  }

  // Selecting an option (incl. arrow-key preview) only updates local state --
  // it does not save on its own. Saves on Enter (desktop keyboard) and on
  // blur (mobile: there's no keyboard "Enter" event when a native picker
  // wheel is dismissed, only a blur -- Enter-only silently broke saving on
  // phones entirely). Blur doesn't reintroduce the original Tab-feels-like-
  // premature-save bug: that was arrow-key *preview* firing onChange on
  // every keypress while still focused/deciding, not blur -- blur only
  // fires once focus genuinely leaves the field, i.e. the user is done.
  function onKeyDown(e) {
    if (e.key === 'Enter') commit(groupRef.current, categoryIdRef.current);
  }
  function onBlur() {
    commit(groupRef.current, categoryIdRef.current);
  }

  // Safety net: onBlur/onKeyDown only fire on a *completed* interaction
  // (dismiss the picker, click away, press Enter). If the user picks a
  // category and is interrupted right then -- a call, switching apps,
  // locking the phone -- before doing any of those, the pick sits in local
  // state/refs only and is silently lost with no commit ever triggered.
  // Confirmed via a live repro: picking a category then closing the tab
  // with zero follow-up interaction reverted to uncategorized. Catching
  // 'visibilitychange' (tab backgrounded) and 'pagehide' (navigating away/
  // closing) covers both the "switched apps" and "closed the tab" cases.
  // Guarded on categoryId actually differing from the transaction's last
  // known saved value, so untouched rows (the vast majority at any given
  // moment) don't fire spurious commits.
  React.useEffect(() => {
    function commitIfDirty() {
      if (categoryIdRef.current && categoryIdRef.current !== (t.categoryId || '')) {
        commit(groupRef.current, categoryIdRef.current);
      }
    }
    function onVisibility() { if (document.hidden) commitIfDirty(); }
    document.addEventListener('visibilitychange', onVisibility);
    window.addEventListener('pagehide', commitIfDirty);
    return () => {
      document.removeEventListener('visibilitychange', onVisibility);
      window.removeEventListener('pagehide', commitIfDirty);
    };
  }, []);

  function addRule() {
    const currentCategoryId = categoryIdRef.current;
    if (!currentCategoryId) { window.alert('Pick a category first.'); return; }
    const match = window.prompt('Always categorize transactions whose description contains:', t.description || '');
    if (match && match.trim()) {
      dispatch({ type: 'ADD_RULE', match: match.trim(), categoryId: currentCategoryId });
      commit(groupRef.current, currentCategoryId);
    }
  }

  return (
    <>
      <select
        value={group}
        onChange={e => {
          const nextGroup = e.target.value;
          groupRef.current = nextGroup;
          categoryIdRef.current = '';
          setGroup(nextGroup);
          setCategoryId('');
        }}
        onKeyDown={onKeyDown}
        onBlur={onBlur}
        className="border rounded px-2 py-1.5 text-sm bg-white"
      >
        {CATEGORIZABLE_GROUPS.map(g => <option key={g} value={g}>{g}</option>)}
      </select>
      <select
        value={categoryId}
        onChange={e => {
          const nextCategoryId = e.target.value;
          categoryIdRef.current = nextCategoryId;
          setCategoryId(nextCategoryId);
        }}
        onKeyDown={onKeyDown}
        onBlur={onBlur}
        className="border rounded px-2 py-1.5 text-sm bg-white"
      >
        <option value="">— pick category —</option>
        {catOptions.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
      </select>
      <button
        type="button"
        onClick={addRule}
        title="Always categorize transactions like this one the same way"
        className="text-xs text-blue-600 hover:underline whitespace-nowrap px-1"
      >+ rule</button>
    </>
  );
}

function AllAccountsView({ setView }) {
  const { state } = useContext(BudgetContext);
  const [categoryFilter, setCategoryFilter] = useState('');
  const accName = (id) => { const a = state.accounts.find(a => a.id === id); return a ? a.name : '—'; };
  function catName(t) {
    if (t.group === 'Deposits') return 'Deposit';
    if (t.group === 'Transfer') return 'Transfer';
    if (!t.group) return 'Needs categorizing';
    const c = state.categories.find(c => c.id === t.categoryId);
    return c ? c.name : '—';
  }
  function matchesFilter(t) {
    if (!categoryFilter) return true;
    if (categoryFilter === '__uncategorized__') return !t.group;
    if (categoryFilter === '__deposits__') return t.group === 'Deposits';
    if (categoryFilter === '__transfer__') return t.group === 'Transfer';
    return t.categoryId === categoryFilter;
  }
  const rows = state.transactions.filter(matchesFilter).sort((a, b) => b.date.localeCompare(a.date));
  const filteredTotal = rows.reduce((s, t) => s + t.amount, 0);

  return (

function computePayoff(balance, aprPercent, payment) {
  const r = (aprPercent / 100) / 12;
  if (!payment || payment <= 0) return { neverPaysOff: true };
  if (r > 0 && payment <= balance * r) return { neverPaysOff: true };
  let bal = balance;
  let totalInterest = 0;
  let months = 0;
  while (bal > 0 && months < 1200) {
    const interest = bal * r;
    totalInterest += interest;
    bal += interest;
    bal -= Math.min(payment, bal);
    months++;
  }
  return { neverPaysOff: false, months, totalInterest };
}

function DebtCard({ debt }) {
  const { state, dispatch } = useContext(BudgetContext);
  const [payment, setPayment] = useState(debt.payment != null ? String(debt.payment) : '');
  const paymentNum = parseFloat(payment);
  const paidSoFar = debtPaidSoFar(state, debt.categoryId);
  const currentBalance = debt.balance - paidSoFar;
  const result = useMemo(() => computePayoff(currentBalance, debt.apr, paymentNum), [currentBalance, debt.apr, paymentNum]);

  return (
    <div className="bg-white rounded-lg shadow-sm border overflow-hidden">
      <div className="px-3 py-1.5 bg-gray-800 text-white font-semibold text-sm tracking-wide flex items-center justify-between">
        <span className="truncate">{debt.name}</span>
        <span className="flex items-center gap-2 shrink-0 text-xs">
          <button
            className="text-gray-300 hover:text-white"
            onClick={() => {
              const name = window.prompt('Debt name', debt.name);
              if (!name || !name.trim()) return;
              const balStr = window.prompt('Starting balance (before any recorded payments)', debt.balance);
              if (balStr === null) return;
              const aprStr = window.prompt('Interest rate (APR %)', debt.apr);
              if (aprStr === null) return;
              const balance = parseFloat(balStr); const apr = parseFloat(aprStr);
              dispatch({ type: 'EDIT_DEBT', id: debt.id, patch: { name: name.trim(), balance: isNaN(balance) ? debt.balance : balance, apr: isNaN(apr) ? debt.apr : apr } });
            }}
          >edit</button>
          <button
            className="text-gray-300 hover:text-red-400"
            onClick={() => { if (window.confirm(`Delete "${debt.name}"?`)) dispatch({ type: 'DELETE_DEBT', id: debt.id }); }}
          >✕</button>
        </span>
      </div>
      <div className="p-2.5 text-[13px] space-y-1.5">
        <div className="flex justify-between">
          <span className="text-gray-500">Balance owed</span>
          <span className="font-semibold tabular-nums">{fmt(currentBalance)}</span>
        </div>
        {paidSoFar !== 0 && (
          <div className="flex justify-between text-[11px] text-green-600">
            <span>Paid so far</span>
            <span className="tabular-nums">{fmt(paidSoFar)}</span>
          </div>

          <label className="text-gray-500 text-[11px] block mb-0.5">Monthly payment</label>
          <input
            type="text"
            className="w-full border rounded px-2 py-1 text-[13px] tabular-nums"
            placeholder="e.g. 300"
            value={payment}
            onChange={e => {
              const val = e.target.value;
              setPayment(val);
              const n = parseFloat(val);
              dispatch({ type: 'EDIT_DEBT', id: debt.id, patch: { payment: isNaN(n) ? '' : n } });
            }}
          />
        </div>
        {payment !== '' && !isNaN(paymentNum) && (
          result.neverPaysOff ? (
            <div className="text-red-600 text-[13px]">That payment will never pay off this balance at {debt.apr}% APR — try a higher amount.</div>
          ) : (
            <div className="bg-gray-50 rounded px-2.5 py-1.5 text-[13px] space-y-1">
              <div className="flex justify-between"><span className="text-gray-500">Paid off in</span><span className="font-semibold tabular-nums">{result.months} months ({Math.floor(result.months / 12)}y {result.months % 12}m)</span></div>
              <div className="flex justify-between"><span className="text-gray-500">Total interest paid</span><span className="font-semibold text-red-600 tabular-nums">{fmt(result.totalInterest)}</span></div>

// Wraps around App's dispatch: shows a brief "Undo" toast after a
// DELETE_TRANSACTION or UPDATE_TRANSACTION, since both are easy to trigger
// with a stray click (the delete/edit links sit right next to each other,
// hover-revealed, on every register row) and previously had no way back
// short of manually re-entering the transaction. Scoped to just these two
// action types on purpose -- this is a safety net for accidental clicks,
// not a full undo/redo history.
function UndoToast({ info, onDismiss }) {
  if (!info) return null;
  return (
    <div className="fixed bottom-4 left-1/2 -translate-x-1/2 z-50 bg-gray-800 text-white rounded-lg shadow-lg px-4 py-2.5 flex items-center gap-3 text-[13px]">
      <span>{info.label}</span>
      <button
        className="font-semibold text-blue-300 hover:text-blue-200"
        onClick={() => { info.restore(); onDismiss(); }}
      >Undo</button>
      <button className="text-gray-400 hover:text-white" onClick={onDismiss} aria-label="Dismiss">✕</button>
    </div>
  );
}

function App() {
  const [state, dispatch] = useReducer(reducer, null, loadInitial);
  const [view, setView] = useState({ type: 'budget' });
  const [monthKey, setMonthKey] = useState(todayMonthKey());
  const [serverReady, setServerReady] = useState(false);
  const [undoInfo, setUndoInfo] = useState(null);
  const undoTimerRef = React.useRef(null);

  function armUndo(info) {
    clearTimeout(undoTimerRef.current);
    setUndoInfo(info);
    undoTimerRef.current = setTimeout(() => setUndoInfo(null), 8000);
  }

  // Every DELETE_TRANSACTION/UPDATE_TRANSACTION anywhere in the app flows
  // through here (it's what's handed out via BudgetContext), so the undo
  // toast works from every screen without each call site having to opt in.
  function dispatchWithUndo(action) {
    if (action.type === 'DELETE_TRANSACTION') {
      const target = state.transactions.find(t => t.id === action.id);
      if (target) {
        const linked = target.linkId ? state.transactions.filter(t => t.linkId === target.linkId) : [target];
        armUndo({
          label: linked.length > 1 ? `Deleted transfer (${fmt(Math.abs(target.amount))})` : `Deleted "${target.description}"`,
          restore: () => dispatch({ type: 'RESTORE_TRANSACTIONS', transactions: linked }),
        });
      }
    } else if (action.type === 'UPDATE_TRANSACTION') {
      const target = state.transactions.find(t => t.id === action.id);
      if (target) {
        const prevPatch = {};
        for (const key of Object.keys(action.patch)) prevPatch[key] = target[key];
        armUndo({
          label: `Changed "${target.description}"`,
          restore: () => dispatch({ type: 'UPDATE_TRANSACTION', id: action.id, patch: prevPatch }),
        });
      }
    }
    dispatch(action);
  }

  // On mount, pull the shared server copy (source of truth across devices) --
  // but only if this device doesn't have local edits that never made it to
  // the server yet (e.g. phone was used while the laptop/server was off).
  // 'simplebudget1_synced' tracks the last state we know for sure the server
  // has. If it's missing entirely (first run ever, or first run after this
  // fix), there's nothing to protect, so behave like before and just load
  // the server's copy. If it's present and doesn't match current local
  // state, this device has unpushed changes -- keep them and let the push
  // effect below retry sending them, instead of silently overwriting them.
  // stateRef always tracks the LATEST state, unlike the `state` variable
  // this effect would otherwise close over from the first render only.
  // Without it, an edit made while the fetch below is still in flight
  // (e.g. opening the app and immediately typing a budgeted amount) gets
  // silently discarded: the dirty-check would run against the pre-edit
  // snapshot, wrongly conclude "not dirty," and let the LOAD below
  // overwrite the fresh edit with older server data. Confirmed as the real
  // cause of "type an amount, it looks fine, then reverts later" -- 2026-07-09.
  const stateRef = React.useRef(state);
  useEffect(() => { stateRef.current = state; }, [state]);

  // Tracks the server's revision counter (see server.py's save_state) --
  // deliberately a plain ref, NOT reducer state. Updating it must never
  // trigger the push effect below on its own (it depends on `state`), or
  // every save would immediately re-trigger another save in a loop. A save
  // is only accepted by the server if this matches what's actually on disk
  // right now -- a stale/rejected push means another tab, a phone, or the
  // daily bank import saved something first, and this client's copy is out
  // of date.
  const revRef = React.useRef(0);

  // Set right before every dispatch({type:'LOAD'}) below (mount load, and
  // conflict recovery in the push effect further down). A LOAD means "this
  // state now exactly mirrors what the server already has" -- without this
  // flag, the state change from LOAD would itself trigger the push effect
  // to immediately echo the same data straight back as a "new" save. That
  // was harmless before _rev existed, but now it burns a real revision
  // bump for zero actual changes -- and two tabs each doing this on mount
  // around the same time was enough to make each one's very next genuine
  // edit spuriously conflict with the other, even though neither tab had
  // actually touched the same thing. Confirmed via a real two-tab test.
  const justLoadedRef = React.useRef(false);

  useEffect(() => {
    const syncedRaw = localStorage.getItem('simplebudget1_synced');
    fetch('/api/state')
      .then(r => r.json())
      .then(serverState => {
        if (!serverState) return;
        const localIsDirty = syncedRaw !== null && syncedRaw !== JSON.stringify(stateRef.current);
        if (localIsDirty) return;
        const { _rev, ...rest } = serverState;
        revRef.current = _rev || 0;
        justLoadedRef.current = true;
        dispatch({ type: 'LOAD', state: rest });
        localStorage.setItem('simplebudget1_synced', JSON.stringify(rest));
      })
      .catch(() => {})
      .finally(() => setServerReady(true));
  }, []);

  // Cache locally always; push to the shared server once we know we're not
  // about to clobber it with stale pre-load data. On a confirmed successful
  // push, record this exact state as the last-known-synced snapshot so a
  // future mount can tell local edits apart from server data. A 409 means
  // the server rejected this push because something else saved first --
  // pulling in the real current data and saying so beats silently losing
  // whatever changed elsewhere (or silently losing this tab's own edit by
  // guessing wrong), which is what happened before this check existed.
  //
  // saveInFlightRef/pendingSaveRef serialize saves to exactly one at a time.
  // Without this, rapid edits (e.g. quickly categorizing several
  // transactions in a row) could fire two overlapping POSTs -- the first
  // to land bumps the server's revision, so the second (built from the
  // now-stale revision it captured before either request finished) gets
  // rejected as a "conflict" even though it was this same tab's own very
  // next edit, not anything external. Queuing collapses any edits that
  // arrive while a save is in flight into one follow-up save of whatever
  // is truly current (via stateRef) once that save finishes, instead of
  // firing a second one that could race it.
  const saveInFlightRef = React.useRef(false);
  const pendingSaveRef = React.useRef(false);

  useEffect(() => {
    localStorage.setItem('simplebudget1', JSON.stringify(state));
    if (justLoadedRef.current) { justLoadedRef.current = false; return; }
    if (!serverReady) return;

    // On a 409, the old behavior was to just load the server's copy and
    // discard whatever this tab was trying to save (with only a passive
    // alert as a trace). But the overwhelmingly common conflict shape is
    // NON-overlapping edits -- the daily bank scraper (or another device)
    // added/changed different transactions than the ones this tab just
    // categorized. Discarding in that case looked exactly like "categorizing
    // doesn't save" any time the scraper's 7am run landed while a phone's
    // tab/PWA had been sitting open since before it. So: reapply just the
    // transactions THIS tab actually changed onto the server's fresh copy,
    // then retry -- but ONLY for records the server hasn't independently
    // touched. A first version of this merged *every* locally-changed
    // transaction unconditionally, which silently let local clobber a
    // genuine same-record edit from another device with zero warning --
    // caught via a live two-device-same-transaction test, worse than the
    // original discard+alert since it lost data with no trace at all. Now:
    // per record, compare the server's fresh copy against what this tab
    // last knew (`lastSynced`) -- if the server's copy is unchanged from
    // that, it's safe to overlay this tab's edit; if the server's copy
    // ALSO differs from `lastSynced`, that's a genuine conflict on that
    // specific record, so the server's version wins for it and the user is
    // still told via the alert (while every non-conflicting record still
    // auto-merges silently).
    async function attemptSave(payload, isRetry) {
      const body = JSON.stringify({ ...payload, _rev: revRef.current });
      const r = await fetch('/api/state', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body,
      }).catch(() => null);
      if (!r) return;
      if (r.status === 409) {
        const conflict = await r.json().catch(() => null);
        if (!conflict || !conflict.serverState) return;
        const { _rev, ...serverRest } = conflict.serverState;
        let merged = serverRest;
        let didMerge = false;
        let hadRealConflict = false;
        if (!isRetry) {
          const lastSyncedRaw = localStorage.getItem('simplebudget1_synced');
          const lastSynced = lastSyncedRaw ? JSON.parse(lastSyncedRaw) : null;
          if (lastSynced) {
            const lastSyncedById = new Map((lastSynced.transactions || []).map(t => [t.id, t]));
            const serverById = new Map((serverRest.transactions || []).map(t => [t.id, t]));
            const changedLocal = payload.transactions.filter(t => {
              const prev = lastSyncedById.get(t.id);
              return !prev || JSON.stringify(prev) !== JSON.stringify(t);
            });
            const safeToApply = changedLocal.filter(t => {
              const prevKnown = lastSyncedById.get(t.id);
              const serverNow = serverById.get(t.id);
              const serverAlsoChangedThisRecord = prevKnown
                ? JSON.stringify(prevKnown) !== JSON.stringify(serverNow)
                : false; // brand-new local record (e.g. an unsynced ADD) -- nothing on the server to conflict with
              if (serverAlsoChangedThisRecord) hadRealConflict = true;
              return !serverAlsoChangedThisRecord;
            });
            if (safeToApply.length) {
              const byId = new Map((serverRest.transactions || []).map(t => [t.id, t]));
              safeToApply.forEach(t => byId.set(t.id, t));
              merged = { ...serverRest, transactions: Array.from(byId.values()) };
              didMerge = true;
            }
          }
        }
        revRef.current = _rev || 0;
        justLoadedRef.current = true;
        dispatch({ type: 'LOAD', state: merged });
        localStorage.setItem('simplebudget1_synced', JSON.stringify(merged));
        if (didMerge) {
          await attemptSave(merged, true);
        }
        if (hadRealConflict || !didMerge) {
          window.alert("Another tab, your phone, or the daily bank import saved changes here since this page last synced" + (hadRealConflict ? ", including an edit to the exact same transaction" : "") + ". Loaded the latest version — please double-check your most recent change on this screen actually went through.");
        }
        return;
      }
      const result = await r.json().catch(() => null);
      if (result && result.rev !== undefined) revRef.current = result.rev;
      localStorage.setItem('simplebudget1_synced', JSON.stringify(payload));
    }

    function doSave() {
      if (saveInFlightRef.current) { pendingSaveRef.current = true; return; }
      saveInFlightRef.current = true;
      attemptSave(stateRef.current, false)
        .finally(() => {
          saveInFlightRef.current = false;
          if (pendingSaveRef.current) {
            pendingSaveRef.current = false;
            doSave();
          }
        });
    }
    doSave();
  }, [state, serverReady]);

  return (
    <BudgetContext.Provider value={{ state, dispatch: dispatchWithUndo }}>
      <div className="flex flex-col md:flex-row">
        <Sidebar view={view} setView={setView} monthKey={monthKey} setMonthKey={setMonthKey} />
        <div className="flex-1 md:h-screen overflow-y-auto">
          {view.type === 'budget' && <BudgetView monthKey={monthKey} />}
          {view.type === 'register' && <RegisterView accountId={view.accountId} />}
          {view.type === 'all-accounts' && <AllAccountsView setView={setView} />}
          {view.type === 'debts' && <DebtsView />}
          {view.type === 'reports' && <ReportsView monthKey={monthKey} />}
          {view.type === 'categorize' && <CategorizeView />}
          {view.type === 'manage-categories' && <ManageCategoriesView />}
        </div>
      </div>
      <UndoToast info={undoInfo} onDismiss={() => setUndoInfo(null)} />
    </BudgetContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
